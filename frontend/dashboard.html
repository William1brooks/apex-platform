<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Platform Dashboard</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; font-family: 'Arial', sans-serif; }
  body { background: #0c0f1a; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }

  .container { width: 95%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; }

  /* Auth Box */
  .auth-box {
    background: linear-gradient(145deg,#1f2937,#111827);
    padding: 30px; border-radius: 15px;
    width: 350px; box-shadow:0 10px 25px rgba(0,0,0,0.5);
    transition: transform 0.3s ease;
  }
  .auth-box:hover { transform: translateY(-5px); }
  .auth-box h2 { text-align:center; margin-bottom:20px; color: #2563eb; }
  .auth-box input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; outline:none; }
  .auth-box button {
    width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px;
    background: linear-gradient(90deg,#2563eb,#3b82f6);
    color:white; cursor:pointer; font-weight:bold; transition: background 0.3s ease;
  }
  .auth-box button:hover { background: linear-gradient(90deg,#3b82f6,#2563eb); }

  /* Logout Button */
  #logoutBtn {
    background: linear-gradient(90deg,#ef4444,#f87171);
    margin-top:20px; width:150px;
  }
  #logoutBtn:hover { background: linear-gradient(90deg,#f87171,#ef4444); }

  /* Dashboard Cards */
  .cards { display:flex; justify-content: space-around; flex-wrap:wrap; margin-top:20px; width:100%; }
  .card {
    background: linear-gradient(135deg,#111827,#1f2937);
    width:220px; padding:20px; margin:10px; border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.5); transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .card:hover { transform:translateY(-5px); box-shadow:0 12px 30px rgba(0,0,0,0.7); }
  .card h3 { margin-bottom:10px; color:#3b82f6; }
  .card p { font-size:1.2em; }

  /* Charts */
  .charts { display:flex; justify-content:space-around; flex-wrap:wrap; margin-top:30px; width:100%; }
  canvas { background:#111827; border-radius:12px; padding:10px; margin:10px; }

  /* Footer */
  footer { text-align:center; margin-top:40px; color:#888; }

</style>
</head>
<body>

<div class="container">

  <!-- Auth Box -->
  <div class="auth-box" id="authBox">
    <h2>Apex Platform</h2>
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="register()">Register / Login</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none; width:100%;">
    <button id="logoutBtn" onclick="logout()">Logout</button>
    <div class="cards">
      <div class="card">
        <h3>Total Balance</h3>
        <p id="totalBalance">$0.00</p>
      </div>
      <div class="card">
        <h3>Total Trades</h3>
        <p id="totalTrades">0</p>
      </div>
      <div class="card">
        <h3>Total Deposits</h3>
        <p id="totalDeposits">$0.00</p>
      </div>
      <div class="card">
        <h3>Total Withdrawals</h3>
        <p id="totalWithdrawals">$0.00</p>
      </div>
    </div>

    <div class="charts">
      <canvas id="tradesChart" width="400" height="200"></canvas>
      <canvas id="balanceChart" width="400" height="200"></canvas>
    </div>
  </div>

</div>

<footer>
  &copy; 2026 Apex Platform
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API_URL = "https://apex-backend-a2hi.onrender.com";
let currentUserId = null;

// -----------------------
// Register/Login
// -----------------------
async function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API_URL}/api/register`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({name,email,password})
  });
  const data = await res.json();

  if(data.id || data.message){
    currentUserId = data.id || null;
    document.getElementById("authBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadDashboard();
  } else {
    alert(JSON.stringify(data));
  }
}

// -----------------------
// Logout
// -----------------------
function logout(){
  currentUserId = null;
  document.getElementById("dashboard").style.display="none";
  document.getElementById("authBox").style.display="block";
}

// -----------------------
// Load Dashboard Data
// -----------------------
async function loadDashboard() {
  // Accounts summary
  const res = await fetch(`${API_URL}/api/accounts-summary`);
  const summary = await res.json();

  document.getElementById("totalBalance").innerText = "$"+summary.totalBalance.toFixed(2);
  document.getElementById("totalTrades").innerText = summary.totalTrades;
  document.getElementById("totalDeposits").innerText = "$"+summary.totalDeposits.toFixed(2);
  document.getElementById("totalWithdrawals").innerText = "$"+summary.totalWithdrawals.toFixed(2);

  // Trades summary for charts
  const tradesRes = await fetch(`${API_URL}/api/trades-summary`);
  const tradesData = await tradesRes.json();

  const ctxTrades = document.getElementById('tradesChart').getContext('2d');
  new Chart(ctxTrades, {
    type:'bar',
    data:{
      labels: tradesData.map(t=>t.symbol),
      datasets:[{
        label:'Trade Amount',
        data: tradesData.map(t=>t.amount),
        backgroundColor:'rgba(59,130,246,0.7)',
        borderColor:'rgba(59,130,246,1)',
        borderWidth:1
      }]
    },
    options:{responsive:true, scales:{ y:{ beginAtZero:true } }}
  });

  const ctxBalance = document.getElementById('balanceChart').getContext('2d');
  new Chart(ctxBalance,{
    type:'line',
    data:{
      labels: tradesData.map(t=>t.symbol),
      datasets:[{
        label:'Account Balance',
        data: tradesData.map(t=>t.balance || 0),
        fill:false,
        borderColor:'rgba(37,99,235,1)',
        tension:0.1
      }]
    },
    options:{responsive:true}
  });
}

// -----------------------
// Auto refresh every 30s
// -----------------------
setInterval(()=>{
  if(currentUserId) loadDashboard();
}, 30000);
</script>
</body>
</html>
